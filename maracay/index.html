<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kensen Weekend | Maracay 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kensen-yellow: #FFA500;
            --kensen-orange-hover: #ff9c00;
            --kensen-red: #ff004e;
            --menu-gray: #8f8f8f;
            --black-base: #000000;
            --white-pure: #FFFFFF;
            --gray-dark: #1A1A1A;
            --font-anton: 'Anton', sans-serif;
            --font-outfit: 'Outfit', sans-serif;
        }

        /* RESET OPERATIVO CON BLINDAJE ANTI-SCROLL HORIZONTAL */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; overflow-x: hidden; position: relative; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--black-base); color: var(--white-pure); font-family: var(--font-outfit); }

        /* ---------------------------------------------------- */
        /* HEADER: LOGO PREMIUM                                 */
        /* ---------------------------------------------------- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: #FFFFFF; display: flex; justify-content: space-between; align-items: center;
            padding: 12px 5%; border: none;
        }
        .nav-logo-link { display: inline-block; line-height: 0; }
        .nav-logo { height: 60px; width: auto; cursor: pointer; transition: transform 0.3s ease; }
        .nav-links { display: flex; align-items: center; gap: 30px; list-style: none; }
        .nav-links a { font-family: var(--font-outfit); font-weight: 300; color: var(--menu-gray); text-decoration: none; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; }
        .header-spacer { height: 84px; width: 100%; }

        /* ---------------------------------------------------- */
        /* SECCIÓN 1: RECALIBRADA EN 2 LÍNEAS (CITY TITLE)      */
        /* ---------------------------------------------------- */
        #city-title {
            width: 100%; background-color: var(--white-pure); padding: 20px 0 45px 0; 
            text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #city-name {
            font-family: var(--font-outfit); font-weight: 900; color: var(--kensen-red);
            font-size: 4.5rem; text-transform: uppercase; letter-spacing: -1.6px; line-height: 1;
        }
        /* Ajuste de espacio entre líneas 20% mayor (line-height: 1.02) */
        #main-title {
            font-family: var(--font-anton); color: var(--black-base); width: 90vw; 
            font-size: 8vw; text-transform: uppercase; line-height: 1.02; margin-top: 4px;
            letter-spacing: -0.03em; display: block;
        }
        #author-name {
            font-family: var(--font-outfit); font-weight: 900; color: var(--kensen-red);
            font-size: 2.25rem; text-transform: uppercase; letter-spacing: -0.8px; line-height: 1;
            margin-top: 8px; display: block;
        }
        #author-emmy {
            font-family: var(--font-outfit); font-weight: 300; color: var(--black-base);
            font-size: 1.125rem; text-transform: uppercase; letter-spacing: 2px; line-height: 1;
            margin-top: 5px; white-space: nowrap; display: block;
        }

        /* ---------------------------------------------------- */
        /* SECCIÓN 2: KENSEN-FOTO (CONTAINER PARALLAX ACTIVO)   */
        /* ---------------------------------------------------- */
        .kensen-foto {
            position: relative; width: 100vw; height: 52.5vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; background-color: var(--black-base);
        }
        .parallax-img {
            position: absolute; top: -20%; left: 0; width: 100%; height: 140%; 
            object-fit: cover; will-change: transform; transform: translate3d(0, 0, 0); z-index: 1;
        }

        /* ---------------------------------------------------- */
        /* SECCIÓN 3: CONTADOR-MARACAY                          */
        /* ---------------------------------------------------- */
        .contador-maracay {
            width: 100%; background-color: var(--white-pure); padding: 70px 5% 50px 5%; 
            color: var(--black-base); display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .contador-intro-text {
            font-family: var(--font-outfit); font-weight: 900; font-size: 18pt; color: var(--black-base);
            text-transform: uppercase; line-height: 1.3; max-width: 90vw; margin-bottom: 17px; 
        }
        .contador-intro-text span { color: var(--kensen-red); }
        .countdown-layout { display: flex; align-items: flex-start; justify-content: center; gap: 30px; width: 100%; max-width: 900px; }
        .countdown-side-title {
            font-family: var(--font-outfit); font-weight: 900; font-size: 18pt; text-transform: uppercase;
            text-align: right; line-height: 1.1; color: var(--black-base); margin-top: 5px; 
        }
        .timer-grid-white { display: flex; gap: 16px; align-items: flex-start; }
        .time-block { display: flex; flex-direction: column; align-items: center; }
        .black-number-box {
            background-color: var(--black-base); color: var(--white-pure); font-family: var(--font-outfit);
            font-weight: 900; font-size: 28.8pt; width: 104px; height: 80px;
            display: flex; align-items: center; justify-content: center; border-radius: 6px;
        }
        .time-label-below {
            font-family: var(--font-outfit); font-weight: 300; font-size: 12pt; 
            color: var(--black-base); text-transform: uppercase; margin-top: 10px; letter-spacing: 1px;
        }

        /* ---------------------------------------------------- */
        /* SECCIÓN 5: PRODUCCIÓN LOGOS                          */
        /* ---------------------------------------------------- */
        .produccion-logos { 
            width: 100%; background-color: var(--black-base); padding: 30px 5%; display: flex; justify-content: center; align-items: center; border: none; 
        }
        .logos-wrapper { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; max-width: 1200px; }
        .produccion-title { font-family: var(--font-outfit); font-weight: 900; font-size: 1.1rem; color: var(--white-pure); text-transform: uppercase; letter-spacing: 1px; margin-right: 50px; }
        .logos-container { display: flex; align-items: center; gap: 50px; }
        .logos-container img { height: 45px; width: auto; object-fit: contain; display: block; border: none; }

        /* ---------------------------------------------------- */
        /* SECCIÓN 6: BLOQUE DESPLEGABLE EVENTOS                */
        /* ---------------------------------------------------- */
        .seccion-eventos-cronograma { width: 100%; background-color: var(--white-pure); margin-top: 5px; padding: 5px 0 30px 0; border: none; }
        .eventos-main-heading {
            font-family: var(--font-outfit); font-weight: 900; font-size: 30px; color: var(--black-base); 
            text-align: center; text-transform: uppercase; letter-spacing: -1px; width: 100%;
            padding: 0 5%; margin-top: 40px; margin-bottom: 30px; line-height: 1.2; white-space: nowrap; 
        }
        .eventos-main-heading span { color: var(--kensen-red); }

        .cronograma-accordion { width: 100%; display: flex; flex-direction: column; border: none; }
        .accordion-bar-item { width: 100%; border: none; outline: none; }
        
        .accordion-bar-header {
            width: 100%; padding: 40px 10%; display: flex; justify-content: flex-start; align-items: center; 
            cursor: pointer; background: none; text-align: left; position: relative; border: none !important; outline: none !important;
        }
        .bar-title-block { display: flex; flex-direction: column; gap: 4px; border: none; }
        .title-inline-wrapper { display: inline-flex; align-items: center; gap: 15px; width: auto; border: none; }
        
        .accordion-bar-header h3 {
            font-family: var(--font-anton); font-size: 70px; letter-spacing: -1.2px; line-height: 55px; text-transform: uppercase; border: none;
        }
        .bar-title-dark { color: var(--white-pure); } 
        .bar-title-light { color: var(--black-base); }
        .accordion-bar-header p { font-family: var(--font-outfit); font-weight: 300; font-size: 25px; color: var(--kensen-red); letter-spacing: -1px; text-transform: uppercase; }

        .arrow-indicator {
            display: inline-block; width: 0; height: 0; border-left: 12px solid var(--white-pure); border-top: 9px solid transparent; border-bottom: 9px solid transparent; 
            margin-top: 5px; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .bar-light-style .arrow-indicator { border-left-color: var(--black-base); }
        .active .arrow-indicator { transform: rotate(90deg); }

        .bar-dark-style { background-color: var(--black-base); color: var(--white-pure); }
        .bar-dark-style:hover .arrow-indicator { color: var(--kensen-red); border-left-color: var(--kensen-red); }
        .bar-light-style { background-color: var(--white-pure); color: var(--black-base); }
        .bar-light-style:hover .arrow-indicator { color: var(--kensen-red); border-left-color: var(--kensen-red); }

        .accordion-bar-content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); padding: 0 10%; border: none; }
        .accordion-bar-content-inner { text-align: left; margin: 0 auto; width: 100%; max-width: 1100px; border: none; }
        .accordion-bar-item.active .accordion-bar-content { max-height: 3000px; padding: 50px 10%; transition: max-height 0.8s ease-in-out; }
        
        .bar-dark-style .accordion-bar-content { background-color: #0a0a0a; color: var(--white-pure); }
        .bar-light-style .accordion-bar-content { background-color: #FFFFFF; color: var(--black-base); }

        /* GRIDS DE CONTENIDO CRONOGRAMA */
        .vtr-content-grid { display: grid; grid-template-columns: 350px 1fr; gap: 70px; align-items: start; border: none; }
        .vtr-left-col { display: flex; flex-direction: column; align-items: center; width: 100%; border: none; }
        .vtr-scaled-poster { width: 325px; height: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 25px; display: block; border: none; }
        
        .vtr-buy-btn {
            width: 325px; background-color: var(--kensen-red); color: var(--white-pure); font-family: var(--font-anton);
            font-size: 2.5rem; text-transform: uppercase; text-align: center; padding: 14px 0; cursor: pointer; 
            transition: background-color 0.2s; text-decoration: none; display: block; line-height: 1; border: none !important;
        }
        .vtr-buy-btn:hover { background-color: #d60042; }
        .vtr-legal-caption { font-family: var(--font-outfit); font-weight: 300; font-size: 11px; text-transform: uppercase; margin-top: 12px; opacity: 0.7; text-align: center; }

        .networking-poster-wrapper { position: relative; width: 325px; margin-bottom: 25px; }
        .fucsia-bar-networking {
            position: absolute; bottom: 0; left: 0; width: 100%; background-color: var(--kensen-red);
            color: var(--white-pure); font-family: var(--font-outfit); font-weight: 900; font-size: 1.6rem;
            text-align: center; padding: 12px 0; text-transform: uppercase; line-height: 1; letter-spacing: 1px;
        }
        .access-special-label {
            font-family: var(--font-outfit); font-weight: 900; font-size: 1.8rem; color: var(--white-pure);
            text-transform: uppercase; text-align: center; line-height: 1.1; letter-spacing: 0.5px; width: 100%;
        }

        .vtr-right-col { display: flex; flex-direction: column; gap: 32px; border: none; }
        .vtr-right-col * { text-transform: uppercase; }
        .vtr-block-text { font-family: var(--font-outfit); line-height: 1.2; }
        .vtr-block-text .black-title { font-weight: 900; font-size: 24px; display: block; }
        .vtr-block-text .light-desc { font-weight: 300; font-size: 19px; display: block; margin-top: 4px; }
        .vtr-block-text .highlight-pink-anton { font-family: var(--font-anton); font-weight: 400; font-size: 32px; color: var(--kensen-red); display: block; margin-bottom: 12px; letter-spacing: 1px; }
        
        .vtr-learn-list { display: flex; flex-direction: column; gap: 18px; list-style: none; }
        .vtr-learn-list li { font-family: var(--font-outfit); font-weight: 300; font-size: 18px; line-height: 1.3; }
        .vtr-learn-list li strong { font-weight: 900; }

        .vtr-meta-info-block { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 24px; }
        .bar-light-style .vtr-meta-info-block { border-top-color: rgba(0, 0, 0, 0.1); }
        .vtr-meta-item { font-family: var(--font-outfit); }
        .vtr-meta-item .meta-label { font-weight: 900; color: var(--kensen-red); font-size: 16px; display: block; margin-bottom: 2px; }
        .vtr-meta-item .meta-val { font-weight: 300; font-size: 21px; display: block; }

        /* ---------------------------------------------------- */
        /* SECCIÓN 7: PATROCINANTES LOGOS                       */
        /* ---------------------------------------------------- */
        .patrocinantes-logos { 
            width: 100%; background-color: var(--black-base); padding: 30px 5%; display: flex; justify-content: center; align-items: center; border: none; border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ---------------------------------------------------- */
        /* SECCIÓN 8: INFO-EVENTO-VENDIDAS                      */
        /* ---------------------------------------------------- */
        .info-evento-vendidas {
            width: 100%; background-color: var(--kensen-red); padding: 55px 5%; display: flex; justify-content: center; align-items: center; border: none;
        }
        .vendidas-wrapper-block {
            width: 100%; max-width: 1050px; display: flex; justify-content: center; align-items: center; gap: 40px;
        }
        .vendidas-left-data-panel {
            display: flex; flex-direction: column; text-align: right; align-items: flex-end; color: var(--white-pure); flex: 1;
        }
        .vendidas-main-heading-panel { font-family: var(--font-outfit); text-transform: uppercase; font-size: 42px; line-height: 1; letter-spacing: -1px; }
        .vendidas-main-heading-panel .weight-black { font-weight: 900; }
        .vendidas-main-heading-panel .weight-light { font-weight: 300; }
        .vendidas-tag-masterclass { font-family: var(--font-outfit); font-weight: 300; font-size: 22px; text-transform: uppercase; line-height: 1; margin-top: 6px; letter-spacing: 0.5px; }
        .vendidas-course-title-panel { font-family: var(--font-outfit); font-weight: 900; font-size: 46px; text-transform: uppercase; line-height: 1; margin-top: 4px; letter-spacing: -0.5px; }
        .vendidas-meta-logistics { display: flex; flex-direction: column; gap: 5px; margin-top: 22px; }
        .vendidas-logistics-line { font-family: var(--font-outfit); font-weight: 300; text-transform: uppercase; font-size: 19px; line-height: 1.1; letter-spacing: 0.5px; }
        .vendidas-logistics-line span.label-black { font-weight: 900; color: #000000; }
        
        .vendidas-right-counter-panel {
            display: flex; flex-direction: column; align-items: flex-start; justify-content: center; color: var(--white-pure); text-align: left; flex: 1;
        }
        .vendidas-counter-label-block {
            font-family: var(--font-outfit); font-weight: 300; font-size: 24px; text-transform: uppercase; line-height: 1.1; letter-spacing: 0.5px; margin-bottom: 24px;
        }
        .vendidas-percentage-huge { font-family: var(--font-anton); font-size: 120px; font-weight: 400; line-height: 0.8; }

        /* ---------------------------------------------------- */
        /* SECCIÓN 9: PRECIOS & PATROCINIOS                     */
        /* ---------------------------------------------------- */
        .precios-planes-wrapper { width: 100%; background-color: var(--black-base); border: none; }
        .precios-main-title-block { width: 100%; background-color: var(--white-pure); padding: 45px 5%; text-align: center; }
        .precios-main-title-block h2 { font-family: var(--font-anton); font-size: 3.5rem; color: var(--black-base); text-transform: uppercase; letter-spacing: 1px; }

        .precios-accordion-container { width: 100%; background-color: var(--black-base); display: flex; flex-direction: column; }
        .precios-accordion-bar, .precios-accordion-bar-named { width: 100%; background-color: var(--black-base); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .precios-bar-header h3 { color: var(--white-pure); }
        .precios-bar-header p { font-family: var(--font-outfit); font-weight: 300; font-size: 25px; color: var(--kensen-red); text-transform: uppercase; margin-top: 8px; }

        .precios-bar-content { max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); padding: 0 5%; }
        .active .precios-bar-content { max-height: 3000px; padding: 40px 5% 80px 5%; }

        .pricing-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 100%; max-width: 1200px; margin: 0 auto;
        }
        .price-card {
            background-color: var(--black-base); display: flex; flex-direction: column; text-align: center; border: none;
        }

        .price-card-white-bg { background-color: var(--white-pure) !important; }
        .price-card-white-bg .price-card-header { color: var(--black-base) !important; }
        .price-card-white-bg .feature-item { color: var(--black-base) !important; }

        .price-card-header {
            font-family: var(--font-anton); font-size: 36px; color: var(--white-pure); text-transform: uppercase; padding: 24px 10px; line-height: 1.1;
        }
        .price-card-amount-box {
            background-color: var(--kensen-red); padding: 30px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .price-card-value { font-family: var(--font-anton); font-size: 110px; color: var(--white-pure); line-height: 0.85; }
        .price-card-subtext { font-family: var(--font-outfit); font-weight: 300; font-size: 18px; color: var(--white-pure); text-transform: uppercase; margin-top: 10px; }
        .price-card-features { padding: 40px 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }

        .feature-item { font-family: var(--font-outfit); text-transform: uppercase; font-size: 16px; line-height: 1.3; color: var(--white-pure); }
        .feature-item.light { font-weight: 300; opacity: 0.85; }
        .feature-item.bold { font-weight: 900; }
        .feature-item.red-tag { color: var(--kensen-red) !important; font-weight: 900; }

        .price-card-buy-btn {
            background-color: var(--kensen-red); color: var(--white-pure); font-family: var(--font-anton); font-size: 42px; text-transform: uppercase; padding: 16px 0; text-decoration: none;
            transition: background-color 0.2s; border: none; cursor: pointer; width: 100%; display: block; outline: none; line-height: 1;
        }
        .price-card-buy-btn:hover { background-color: #d60042; }

        /* ---------------------------------------------------- */
        /* MEDIA QUERIES MÓVILES                                */
        /* ---------------------------------------------------- */
        @media (max-width: 1024px) {
            nav { justify-content: center; padding: 15px 20px; }
            .nav-logo { height: 48px; margin: 0 auto; display: block; }
            .header-spacer { height: 78px; }
            
            #city-name { font-size: 3.2rem; }
            #main-title { font-size: 11.2vw; white-space: normal; line-height: 1.02; width: 95vw; }
            #author-name { font-size: 1.6rem; margin-top: 6px; }
            #author-emmy { font-size: 0.8rem; letter-spacing: 1px; margin-top: 4px; }

            .accordion-bar-header h3, .precios-bar-header h3 { font-size: 32px; line-height: 30px; letter-spacing: -1px; }
            .precios-bar-header p { font-size: 14px; letter-spacing: -0.5px; }
            .arrow-indicator { border-left-width: 8px; border-top-width: 6px; border-bottom-width: 6px; }

            .pricing-grid { grid-template-columns: 1fr; gap: 40px; }
            .price-card-value { font-size: 90px; }
            .price-card-header { font-size: 30px; padding: 18px 5px; }
            .price-card-buy-btn { font-size: 32px; padding: 14px 0; }

            .info-evento-vendidas { padding: 45px 24px; }
            .vendidas-wrapper-block { flex-direction: column; text-align: center; gap: 30px; }
            .vendidas-left-data-panel { text-align: center; align-items: center; width: 100%; }
            .vendidas-right-counter-panel { text-align: center; align-items: center; width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="https://cesarkensen.com" class="nav-logo-link">
            <img src="logo-kensen-black.png" alt="Cesar Kensen" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="/direccion">Dirección</a>
            <a href="/cursos">Cursos</a>
            <a href="/comedia">Comedia</a>
            <a href="#contacto">Contacto</a>
        </div>
    </nav>
    <div class="header-spacer"></div>

    <section id="city-title">
        <div id="city-name">Maracay</div>
        <div id="main-title">Mejora tus ganancias<br>y tus redes</div>
        <div id="author-name">con cesar kensen</div>
        <div id="author-emmy">ganador del emmy</div>
    </section>

    <section class="kensen-foto">
        <img src="kensen-foto-vtr.jpg" alt="Cesar Kensen" class="parallax-img" id="hero-img">
    </section>

    <script>
        // SCRIPT RECONECTADO: CÁLCULO DE TRASLACIÓN PARALLAX EN TIEMPO REAL
        const heroImg = document.getElementById('hero-img');
        window.addEventListener('scroll', () => {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            // Se inyecta la transformación 3D por hardware
            heroImg.style.transform = `translate3d(0, ${scrollTop * 0.15}px, 0)`;
        });

        function handleAccordionToggle(btn) { btn.parentElement.classList.toggle('active'); }
    </script>
</body>
</html>
