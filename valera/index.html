<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Contacto | Cesar Kensen</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #FFFFFF;
            --black: #000000;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--white);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            width: 100%;
            max-width: 750px;
            padding: 40px;
            margin: 20px;
            background-color: var(--white);
        }

        iframe {
            width: 100%;
            height: 500px; /* El script de Tally ajustará esto dinámicamente */
            border: none;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 20px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <iframe 
            src="https://tally.so/embed/kdJAOM?alignLeft=1&hideTitle=1&dynamicHeight=1" 
            loading="lazy" 
            title="Formulario de Registro Corporativo">
        </iframe>
    </div>

    <script src="https://tally.so/widgets/embed.js"></script>

</body>
</html>
