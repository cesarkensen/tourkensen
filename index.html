<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vende tus redes como kensen - TOUR 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow-old: #F4BF3A;
            --white-hueso: #FFFFFF;
            --black-absolute: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            text-transform: lowercase;
            font-family: 'Helvetica Neue', 'Inter', sans-serif;
        }

        body {
            background-color: var(--black-absolute);
            color: var(--white-hueso);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 700;
            /* EL PÓSTER: Siempre completo de fondo, ajustado al alto */
            background-image: url('poster_oficial_grande.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            background-attachment: fixed;
        }

        .content-layer {
            width: 100%;
            max-width: 1400px;
            padding: 60px 5% 40px 5%;
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Alineación a la derecha */
            text-align: right;
            z-index: 5;
        }

        /* TÍTULO ACTUALIZADO */
        .title-block {
            color: var(--yellow-old);
            font-size: clamp(40px, 5vw, 70px);
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 40px;
            letter-spacing: -2px;
        }

        .tour-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* LINKS EN BLANCO POR DEFAULT */
        .tour-list a {
            display: block;
            text-decoration: none;
            color: var(--white-hueso); 
            font-size: clamp(25px, 3vw, 40px);
            transition: color 0.2s ease;
        }

        /* HOVER: SOLO AMARILLO, SIN RESPLANDOR */
        .tour-list a:hover {
            color: var(--yellow-old);
        }

        .list-date-block { display: inline-block; margin-right: 15px; }
        .list-month { opacity: 0.6; margin-right: 5px; }
        .list-day { color: var(--yellow-old); }
        .list-city { font-weight: 900; }

        /* FECHA QUE YA PASÓ: Baja opacidad y tachado */
        .agotada {
            opacity: 0.3;
            text-decoration: line-through;
            pointer-events: none;
        }

        /* WHATSAPP */
        .whatsapp-contact {
            margin-top: 50px;
            font-size: clamp(20px, 2vw, 30px);
            color: var(--white-hueso);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-bottom 0.2s;
        }
        .whatsapp-contact:hover {
            color: var(--yellow-old);
            border-bottom: 2px solid var(--yellow-old);
        }

        /* CRÉDITOS ACTUALIZADOS */
        footer {
            margin-top: auto;
            width: 100%;
            padding: 40px 5%;
            text-align: right;
            opacity: 0.5;
            font-size: 14px;
        }
        .highlight { color: var(--yellow-old); font-weight: 900; }
    </style>
</head>
<body>

    <div class="content-layer">
        <div class="title-block">
            vende tus redes<br>como kensen -<br>TOUR 2026
        </div>

        <div class="tour-list">
            <a href="#" class="agotada">
                <span class="list-date-block"><span class="list-month">mar</span><span class="list-day">27</span></span>
                <span class="list-city">caracas 🇻🇪</span>
            </a>

            <a href="TU_LINK_TICKETPLATE">
                <span class="list-date-block"><span class="list-month">abr</span><span class="list-day">18</span></span>
                <span class="list-city">caracas 🇻🇪</span>
            </a>

            <a href="TU_LINK_TICKETPLATE">
                <span class="list-date-block"><span class="list-month">may</span><span class="list-day">09</span></span>
                <span class="list-city">valencia 🇻🇪</span>
            </a>

            <a href="https://wa.me/584242133500" class="whatsapp-contact">
                Para más información: Whatsapp +58 424 213.3500
            </a>
        </div>
    </div>

    <footer>
        <div class="credit-line">producción general: <span class="highlight">Medio Palo LLC + Hi Protection</span></div>
        <div class="credit-line">dirección: <span class="highlight">César Kensen</span></div>
    </footer>

</body>
</html>
