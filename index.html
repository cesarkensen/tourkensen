<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vende tus redes tour 2026 como kensen.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow-old: #F4BF3A;
            --white-hueso: #FFFFFF;
            --black-absolute: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            text-transform: lowercase;
            /* Prioridad absoluta a Helvetica Neue Bold */
            font-family: 'Helvetica Neue', 'Inter', sans-serif;
            font-weight: 800; /* Bold/Heavy */
        }

        body {
            background-color: var(--black-absolute);
            color: var(--white-hueso);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Evita scroll si no es necesario */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* [A] EL PÓSTER: CAPA DE FONDO INMERSIVO */
        .background-poster {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Usa tu nueva imagen */
            background-image: url('poster_oficial_grande2.jpg'); 
            background-size: cover; /* "Exactly like the image" cover visual */
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Capa de oscurecimiento sutil para legibilidad de texto (Opcional, pero recomendado) */
        .background-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); /* 40% negro encima */
            z-index: 2;
        }

        /* [B] CAPA DE CONTENIDO: CENTRADO ABSOLUTO */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: right; /* Alineación general a la derecha */
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Alinea los bloques a la derecha */
            width: 90%;
            max-width: 900px; /* Limite de ancho para que no se desparrame en 4k */
            pointer-events: none; /* No bloquea el hover del póster si lo hubiera */
        }

        /* TÍTULO GIGANTE AMARILLO (Exacto imagen) */
        .title-block {
            color: var(--yellow-old);
            /* Tamaño responsive que escala entre 30px y 70px según pantalla */
            font-size: clamp(30px, 6vw, 70px); 
            line-height: 0.95;
            margin-bottom: 30px;
            letter-spacing: -2px;
            pointer-events: auto;
        }

        /* LISTA DE FECHAS (Exacto imagen) */
        .tour-list {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Separación pegada pero legible */
        }

        .tour-list a {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            text-decoration: none;
            color: inherit; /* Blanco por defecto */
            font-size: clamp(20px, 4vw, 38px); /* Tamaño responsive */
            transition: color 0.1s;
            margin-bottom: 2px;
        }

        /* HOVER: SOLO AMARILLO, SIN RESPLANDOR */
        .tour-list a:hover {
            color: var(--yellow-old);
        }

        /* COMPONENTES DE LA LÍNEA (Alineación imagen) */
        .list-status-txt { margin-right: 15px; opacity: 0.5; } /* "agotada" */
        
        .list-date-block { display: flex; align-items: baseline; font-weight: 800;}
        .list-month { margin-right: 5px; opacity: 0.7; }
        .list-day { color: var(--yellow-old); margin-right: 15px;}
        
        .list-city { font-weight: 900;}
        .list-flag { font-size: 0.8em; margin-left: 10px; } /* Bandera un poco más pequeña */

        /* FECHA AGOTADA: Baja opacidad y tachado */
        .agotada {
            opacity: 0.3;
            text-decoration: line-through;
            pointer-events: none; /* No clickeable */
        }
        .agotada:hover {
            color: inherit;
            text-shadow: none;
            text-decoration: line-through;
        }

        /* ENLACE DE WHATSAPP */
        .whatsapp-contact {
            display: block;
            margin-top: 50px;
            font-size: clamp(16px, 2.5vw, 28px);
            font-weight: 900;
            color: var(--white-hueso);
            text-decoration: none;
            transition: color 0.2s;
        }
        .whatsapp-contact:hover {
            color: var(--yellow-old);
        }

        /* [C] PIE DE PÁGINA: CRÉDITOS ELITE STYLE */
        footer {
            position: absolute;
            bottom: 0; right: 0;
            padding: 30px 60px;
            font-size: 0.8rem;
            opacity: 0.6;
            line-height: 1.5;
            z-index: 10;
            text-align: right;
            pointer-events: none;
        }
        .highlight { color: var(--yellow-old); font-weight: 900; }

        /* Ajustes para Celulares */
        @media (max-width: 600px) {
            body { overflow: auto; } /* Permitir scroll si el contenido es muy alto */
            .main-container { padding-top: 50px; padding-bottom: 120px;}
            footer { position: relative; padding: 20px 5%; width: 100%;}
        }

    </style>
</head>
<body>

    <div class="background-poster"></div>
    <div class="main-container">

                <span class="list-city">caracas<span class="list-flag">🇻🇪</span></span>
            </a>

            <a href="https://wa.me/584242133500" class="whatsapp-contact">
                para más información: Whatsapp +58 424 213.3500
            </a>

        </div>

    </div>

    <footer>
        <div class="credit-line">producción general: <span class="highlight">Medio Palo LLC + Hi Protection</span></div>
        <div class="credit-line">dirección: <span class="highlight">César Kensen</span></div>
    </footer>

</body>
</html>
