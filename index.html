<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesar Kensen | Elige tu Kensen</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kensen-yellow: #FFA500;
            --white-pure: #FFFFFF;
            --black-base: #000000;
            --pink-sold: #9D005D;
            --font-anton: 'Anton', sans-serif;
            --font-outfit: 'Outfit', sans-serif;
        }

        /* Reset y Estructura Base Operativa */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--black-base);
            color: var(--white-pure);
            font-family: var(--font-outfit);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: row;
        }

        /* Estructura para ocultar texto manteniendo indexación SEO limpia */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ---------------------------------------------------- */
        /* LAYOUT ESCRITORIO (PC) - ARQUITECTURA LATERAL       */
        /* ---------------------------------------------------- */

        /* Bloque Izquierdo: Retrato César Kensen */
        .photo-sidebar {
            width: 35%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-image: url('kensen-cara.png');
            background-size: cover;
            background-position: left center;
            z-index: 10;
        }

        /* Bloque Derecho: Contenido de Conversión */
        .content-container {
            width: 65%;
            margin-left: 35%;
            padding: 40px 5% 60px 5%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
        }

        /* Brand Header */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .logo-kensen {
            width: 280px;
            height: auto;
            display: block;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            font-family: var(--font-outfit);
            font-weight: 900; /* Outfit Black */
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--white-pure);
        }

        /* Trinidad de Botones Dinámicos (Grid de Selección) */
        .kensen-grid {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .kensen-card {
            position: relative;
            aspect-ratio: 3 / 4;
            border: 2px solid var(--white-pure);
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Contenedores de Imagen con transiciones aceleradas por hardware */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), filter 0.5s ease;
            z-index: 1;
            filter: grayscale(100%);
        }

        .card-direccion { background-image: url('direccion-button-color.png'); }
        .card-cursos { background-image: url('cursos-button-color.png'); }
        .card-comedia { background-image: url('comedia-button-color.png'); }

        .kensen-card:hover .card-bg {
            filter: grayscale(0%);
            transform: scale(1.03);
        }

        /* Sección del TOUR 2026 */
        .tour-wrapper {
            width: 100%;
            max-width: 800px;
        }

        .tour-header {
            font-family: var(--font-outfit);
            font-weight: 900; /* Outfit Black */
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--white-pure);
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 6px;
        }

        .tour-list {
            display: flex;
            flex-direction: column;
