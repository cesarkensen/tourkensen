<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cesar Kensen | Elige tu Kensen</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kensen-yellow: #FFA500;
            --white-pure: #FFFFFF;
            --black-base: #000000;
            --pink-sold: #9D005D;
            --font-anton: 'Anton', sans-serif;
            --font-outfit: 'Outfit', sans-serif;
        }

        /* Reset y Estructura Base Operativa */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--black-base);
            color: var(--white-pure);
            font-family: var(--font-outfit);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: row;
        }

        /* ---------------------------------------------------- */
        /* LAYOUT ESCRITORIO (PC) - ARQUITECTURA LATERAL       */
        /* ---------------------------------------------------- */

        /* Bloque Izquierdo: Retrato César Kensen */
        .photo-sidebar {
            width: 35%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-image: url('direccion-button-color.jpg'); /* Localización de imagen raíz */
            background-size: cover;
            background-position: left center;
            z-index: 10;
        }

        /* Bloque Derecho: Contenido de Conversión */
        .content-container {
            width: 65%;
            margin-left: 35%;
            padding: 60px 5%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
        }

        /* Brand Header */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .logo-kensen {
            width: 280px;
            height: auto;
            display: block;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            font-family: var(--font-outfit);
            font-weight: 900; /* Outfit Black */
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--white-pure);
        }

        /* Trinidad de Botones Dinámicos (Grid de Selección) */
        .kensen-grid {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 60px;
        }

        .kensen-card {
            position: relative;
            aspect-ratio: 3 / 4;
            border: 2px solid var(--white-pure);
            overflow: hidden;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        /* Contenedores de Imagen con efecto de escala de grises a color hardware-accelerated */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), filter 0.5s ease;
            z-index: 1;
            filter: grayscale(100%);
        }

        .card-dirección { background-image: url('direccion-button-color.jpg'); }
        .card-cursos { background-image: url('cursos-button-color.jpg'); }
        .card-comedia { background-image: url('comedia-button-color.jpg'); }

        .kensen-card:hover .card-bg {
            filter: grayscale(0%);
            transform: scale(1.03);
        }

        /* Textos de las tarjetas con tipografía Anton */
        .card-title {
            font-family: var(--font-anton);
            font-size: 2.8rem;
            color: var(--white-pure);
            text-transform: uppercase;
            line-height: 0.9;
            position: relative;
            z-index: 2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            text-align: left;
        }

        .card-footer-text {
            font-family: var(--font-outfit);
            font-weight: 900;
            font-size: 0.8rem;
            color: var(--white-pure);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 2;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
            text-align: left;
            margin-top: auto;
        }

        /* Sección del TOUR 2026 */
        .tour-wrapper {
            width: 100%;
            max-width: 800px;
        }

        .tour-header {
            font-family: var(--font-outfit);
            font-weight: 900; /* Outfit Black */
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--white-pure);
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .tour-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tour-item {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            text-decoration: none;
            color: var(--white-pure);
            padding: 8px 0;
            transform-origin: right center;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Agrupamiento dinámico para escala síncronizada (Fecha + Ciudad) */
        .tour-content-group {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            transform-origin: right center;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tour-date {
            font-family: var(--font-outfit);
            font-weight: 300; /* Outfit Light */
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            margin-right: 15px;
            transition: color 0.25s ease;
        }

        .tour-city {
            font-family: var(--font-outfit);
            font-weight: 900; /* Outfit Black */
            font-size: 1.8rem;
            text-transform: uppercase;
            transition: color 0.25s ease;
        }

        /* Ejecución de efectos simultáneos corregidos al hacer Hover */
        .tour-item:hover .tour-content-group {
            transform: scale(1.08); /* Aumenta el tamaño de la fecha y ciudad al unísono */
        }

        .tour-item:hover .tour-city {
            color: var(--kensen-yellow); /* Solo la ciudad cambia al amarillo de marca */
        }

        .tour-item:hover .tour-date {
            color: var(--white-pure); /* La fecha se ilumina sutilmente al escalar */
        }

        /* Estado Sold Out */
        .tour-item.sold-out {
            opacity: 0.2;
            cursor: default;
            pointer-events: none;
        }
        .tour-item.sold-out .tour-city {
            text-decoration: line-through;
        }

        /* Footer reglamentario */
        footer {
            width: 100%;
            max-width: 800px;
            margin-top: 60px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .footer-text {
            font-family: var(--font-outfit);
            font-weight: 300; /* Outfit Light */
            font-size: 8px;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ---------------------------------------------------- */
        /* MEDIA QUERIES - OPTIMIZACIÓN MÓVIL Y TABLETS         */
        /* ---------------------------------------------------- */

        @media (max-width: 1024px) {
            body {
                flex-direction: column;
                position: relative;
            }

            /* Retrato fijo de fondo al 70% pegado arriba a la izquierda */
            .photo-sidebar {
                width: 100vw;
                height: 100vh;
                position: fixed;
                top: 0;
                left: 0;
                z-index: -1;
                opacity: 0.7;
                background-position: left top;
                pointer-events: none;
            }

            .content-container {
                width: 100%;
                margin-left: 0;
                padding: 40px 24px;
                align-items: center;
                text-align: center;
                background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.85) 100%);
            }

            header {
                align-items: center;
                margin-bottom: 35px;
            }

            .logo-kensen {
                width: 240px;
                margin-bottom: 10px;
            }

            .kensen-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                margin-bottom: 45px;
            }

            .kensen-card {
                aspect-ratio: 16 / 9;
                align-items: flex-start;
                text-align: left;
            }

            .card-title {
                font-size: 2.2rem;
            }

            .tour-wrapper {
                text-align: center;
            }
            
            .tour-header {
                text-align: center;
            }

            .tour-item {
                justify-content: center;
                padding: 12px 0;
                background: rgba(255,255,255,0.02);
                border-radius: 4px;
                margin-bottom: 4px;
                transform-origin: center center;
            }

            .tour-content-group {
                justify-content: center;
                transform-origin: center center;
            }

            .tour-item:hover .tour-content-group {
                transform: scale(1.04); /* Escala controlada en pantallas táctiles */
            }

            .tour-city {
                font-size: 1.4rem;
            }

            .tour-date {
                font-size: 1rem;
            }

            footer {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="photo-sidebar"></div>

    <div class="content-container">
        
        <header>
            <img src="logo-kensen.png" alt="Cesar Kensen" class="logo-kensen">
            <div class="brand-subtitle">Elige tu Kensen</div>
        </header>

        <nav class="kensen-grid">
            
            <a href="/direccion" class="kensen-card">
                <div class="card-bg card-dirección"></div>
                <div class="card-title">Dirección</div>
                <div class="card-footer-text">Edición & Marketing</div>
            </a>

            <a href="/cursos" class="kensen-card">
                <div class="card-bg card-cursos"></div>
                <div class="card-title">Cursos</div>
                <div class="card-footer-text">Cursos & Asesorías</div>
            </a>

            <a href="/comedia" class="kensen-card">
                <div class="card-bg card-comedia"></div>
                <div class="card-title">Comedia</div>
                <div class="card-footer-text">Podcasts & Shows</div>
            </a>

        </nav>

        <section class="tour-wrapper">
            <h2 class="tour-header">Próximos Shows en Vivo</h2>
            <div class="tour-list">

                <a href="https://wa.me/584242133500?text=Hola!%20Quiero%20comprar%20mi%20entrada%20para%20Maracay" class="tour-item">
                    <div class="tour-content-group">
                        <span class="tour-date">18 Jul</span>
                        <span class="tour-city">Maracay</span>
                    </div>
                </a>

                <a href="https://wa.me/584242133500?text=Hola!%20Quiero%20comprar%20mi%20entrada%20para%20Valera" class="tour-item">
                    <div class="tour-content-group">
                        <span class="tour-date">01 Ago</span>
                        <span class="tour-city">Valera</span>
                    </div>
                </a>

                <a href="https://wa.me/584242133500?text=Hola!%20Quiero%20comprar%20mi%20entrada%20para%20Valencia" class="tour-item">
                    <div class="tour-content-group">
                        <span class="tour-date">08 Ago</span>
                        <span class="tour-city">Valencia</span>
                    </div>
                </a>

                <a href="https://wa.me/584242133500?text=Hola!%20Quiero%20comprar%20mi%20entrada%20para%20Visionarias" class="tour-item">
                    <div class="tour-content-group">
                        <span class="tour-date">15 Ago</span>
                        <span class="tour-city">Maracay: Visionarias</span>
                    </div>
                </a>

            </div>
        </section>

        <footer>
            <div class="footer-text">
                <p>Medio Palo LLC</p>
                <p>2026 Todos los derechos reservados.</p>
            </div>
        </footer>

    </div>

</body>
</html>
