<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vende tus redes tour 2026 como kensen.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #F4BF3A;
            --white: #FFFFFF;
            --black: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            text-transform: lowercase;
            font-family: 'Helvetica Neue', 'Inter', sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* FONO: Centrado y cubriendo todo */
            background-image: url('poster_oficial_grande2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* Overlay para asegurar que el texto se lea en cualquier pantalla */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1400px;
            padding: 40px;
            display: flex;
            /* En PC mandamos el texto a la derecha para no tapar la cara */
            justify-content: flex-end; 
            align-items: center;
        }

        .content-box {
            text-align: right;
            max-width: 650px;
        }

        .title {
            color: var(--yellow);
            font-size: clamp(45px, 8vw, 85px);
            font-weight: 900;
            line-height: 0.85;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        .tour-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tour-item {
            text-decoration: none;
            color: var(--white);
            font-size: clamp(24px, 4vw, 42px);
            font-weight: 700;
            display: flex;
            justify-content: flex-end;
            align-items: baseline;
            transition: color 0.2s;
        }

        .tour-item:hover { color: var(--yellow); }

        .month { opacity: 0.6; margin-right: 8px; }
        .day { color: var(--yellow); margin-right: 15px; }
        .city { font-weight: 900; }
        .flag { margin-left: 10px; font-size: 0.8em; }

        .status-agotada {
            opacity: 0.3;
            text-decoration: line-through;
            pointer-events: none;
        }
        .label-agotada { font-size: 0.6em; margin-right: 15px; opacity: 0.8; text-decoration: none; display: inline-block;}

        .whatsapp {
            display: block;
            margin-top: 40px;
            font-size: clamp(18px, 3vw, 32px);
            color: var(--white);
            text-decoration: none;
            font-weight: 900;
        }
        .whatsapp:hover { color: var(--yellow); }

        footer {
            position: fixed;
            bottom: 20px;
            right: 40px;
            text-align: right;
            z-index: 10;
            font-size: 14px;
            opacity: 0.6;
        }
        .highlight { color: var(--yellow); font-weight: 900; }

        /* AJUSTE PARA MÓVIL */
        @media (max-width: 768px) {
            body { 
                background-position: 35% center; /* Movemos la foto para que se vea tu cara de fondo */
            }
            body::before {
                background: rgba(0,0,0,0.5); /* Oscurecemos más para que el texto resalte */
            }
            .main-wrapper { 
                justify-content: center; /* Centramos el texto en el móvil */
                padding: 20px;
            }
            .content-box { text-align: center; }
            .tour-item { justify-content: center; }
            footer { 
                position: relative; 
                right: auto; 
                bottom: auto; 
                margin-top: 40px; 
                text-align: center;
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="content-box">
            <h1 class="title">vende tus redes<br>tour 2026<br>como kensen.</h1>

            <div class="tour-list">
                <div class="tour-item status-agotada">
                    <span class="label-agotada">agotada</span>
                    <span class="month">mar</span><span class="day">27</span>
                    <span class="city">caracas <span class="flag">🇻🇪</span></span>
                </div>

                <a href="TU_LINK" class="tour-item">
                    <span class="month">abr</span><span class="day">18</span>
                    <span class="city">caracas <span class="flag">🇻🇪</span></span>
                </a>

                <a href="https://wa.me/584242133500" class="whatsapp">
                    para más información: whatsapp +58 424 213.3500
                </a>
            </div>
        </div>
    </div>

    <footer>
        <p>producción general: <span class="highlight">medio palo llc + hi protection</span></p>
        <p>dirección: <span class="highlight">césar kensen</span></p>
    </footer>

</body>
</html>
