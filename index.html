<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterclass Cesar Kensen | Próximas Fechas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #E94E77;
            --fuchsia-sold: #9D005D; /* Fucsia intenso y oscuro */
            --black: #1A1A1A;
            --gray: #F4F4F4;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f0f0;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--black);
        }

        .container {
            background: white;
            width: 95%;
            max-width: 500px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-radius: 4px;
            border-top: 8px solid var(--black);
            position: relative;
            overflow: hidden;
        }

        .container::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 8px;
            background: linear-gradient(to bottom, #7B2FF7, #E94E77, #2F80ED);
        }

        h1 {
            font-weight: 900;
            font-size: 1.8rem;
            line-height: 1.1;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--pink);
            display: block;
        }

        .subtitle {
            font-size: 0.9rem;
            font-weight: 700;
            color: #777;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .data-grid {
            margin-top: 20px;
        }

        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            text-decoration: none;
            color: var(--black);
            transition: all 0.3s ease;
        }

        /* Hover solo para los que tienen link */
        a.data-item:hover {
            padding-left: 5px;
            background: rgba(233, 78, 119, 0.05);
        }

        .data-item.sold-out-row {
            cursor: default;
            pointer-events: none; /* Deshabilita el click */
        }

        .label {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1rem;
        }

        .strikethrough {
            text-decoration: line-through;
            color: #bbb;
        }

        .sold-out-tag {
            color: var(--fuchsia-sold);
            font-size: 0.75rem;
            font-weight: 900;
            margin-left: 8px;
            vertical-align: middle;
        }

        .value {
            font-weight: 700;
            font-size: 0.9rem;
            text-align: right;
            color: var(--pink);
        }

        .sold-out-row .value {
            color: #bbb;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #aaa;
            text-align: center;
            line-height: 1.4;
        }

        .wa-icon {
            font-size: 1.2rem;
            margin-left: 10px;
        }

        @media (max-width: 480px) {
            .container { padding: 25px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="content">
        <h1>Vende tus redes <span>Masterclass</span></h1>
        <p class="subtitle">Selecciona tu ciudad para inscribirte</p>

        <div class="data-grid">
            
            <div class="data-item sold-out-row">
                <span class="label strikethrough">Caracas <span class="sold-out-tag">SOLD OUT</span></span>
                <span class="value">11 ABRIL</span>
            </div>

            <div class="data-item sold-out-row">
                <span class="label strikethrough">Caracas <span class="sold-out-tag">SOLD OUT</span></span>
                <span class="value">18 ABRIL</span>
            </div>

            <a href="https://wa.me/584242133500?text=Hola!%20Quiero%20comprar%20mi%20entrada%20para%20el%20Masterclass%20de%20Cesar%20Kensen%20BARQUISIMETO%20REDES%20por%20favor%20❤️‍🔥" class="data-item" target="_blank">
                <span class="label">Barquisimeto</span>
                <span class="value">26 ABRIL 🔥</span>
            </a>

            <a href="https://wa.me/584242133500?text=Hola!%20Quiero%20comprar%20mi%20entrada%20para%20el%20Masterclass%20de%20Cesar%20Kensen%20VALENCIA%20REDES%20por%20favor%20❤️‍🔥" class="data-item" target="_blank">
                <span class="label">Valencia</span>
                <span class="value">09 MAYO 🔥</span>
            </a>

        </div>

        <div class="footer">
            © 2026 Medio Palo LLC. Todos los derechos reservados.<br>
            Desarrollado con el CODEX Kensen.
        </div>
    </div>
</div>

</body>
</html>
